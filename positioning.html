<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            right: 30px;
            border: 3px solid firebrick;
        }
        .absolute{
            position: absolute;
            left: 50px;
            border: 3px solid blue;
        }
        .relative{
            position: relative;
            left: 100px;
            border: 3px solid green;
        }
        .fixed{
            position: fixed;
            top: 0;
            right:20px ;
            width: 300px;
            border: 3px solid yellow;
        }
        .sticky{
            position: sticky;
            top: 1px;
            left: 20px;
            width: 100px;
            border: 3px solid purple;
        }
    </style>
</head>
<body>
    <h2>Positioning</h2>
    <div>div with no position property</div>
    <div class="sticky">div with sticky position property</div>
    <div class="relative">div with relative position property</div>
    <div class="absolute">div with absolute position property</div>
    <div class="fixed">div with fixed positoin property</div>
