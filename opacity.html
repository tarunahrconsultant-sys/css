<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: firebrick;
            padding: 10px;
        }
        .first{
            opacity: 0.1;
        }
        .second{
            opacity: 0.3;
        }
        .third{
            opacity: 0.6;
        }
        img{
            height: 200px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Opacity property</h1>
    <div class="first">opacity 0.1</div>
    <div class="second">opacity 0.3</div>
    <div class="third">opacity 0.6</div>
    <div>opacity 1(default)</div>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTihtgFcjyHWYX-hVoyntJICrgdpTJ4Mf-0YA&s" class="first">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTihtgFcjyHWYX-hVoyntJICrgdpTJ4Mf-0YA&s" class="second">
    <img src="https://cdn.wccftech.com/wp-content/uploads/2018/07/Clash-Royale-Revenue-Landmark-01-Header.jpg" class="third">
</body>
</html>
